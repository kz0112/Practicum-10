definitions:
  models.Appointment:
    properties:
      date:
        type: string
      doctor:
        $ref: '#/definitions/models.Doctor'
      doctor_id:
        type: integer
      id:
        type: integer
      user:
        allOf:
        - $ref: '#/definitions/models.User'
        description: "\U0001F517 Relations"
      user_id:
        type: integer
    required:
    - date
    - doctor_id
    - user_id
    type: object
  models.Doctor:
    properties:
      appointments:
        description: "\U0001F517 Relations"
        items:
          $ref: '#/definitions/models.Appointment'
        type: array
      id:
        type: integer
      name:
        type: string
      specialty:
        type: string
    required:
    - name
    - specialty
    type: object
  models.User:
    properties:
      appointments:
        description: "\U0001F517 Relations"
        items:
          $ref: '#/definitions/models.Appointment'
        type: array
      createdAt:
        format: int64
        type: integer
      email:
        type: string
      id:
        type: integer
      name:
        type: string
      password:
        description: ❗ response-та шықпайды
        type: string
    required:
    - email
    - name
    - password
    type: object
info:
  contact: {}
paths:
